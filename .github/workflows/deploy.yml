name: Deploy to Azure Container Apps

on:
  # Triggered directly when only application code changes on develop
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - 'client/**'
      - 'package.json'
  # Triggered after infrastructure deployment completes (handles the case
  # where infra + app code change together — ensures strict ordering)
  workflow_run:
    workflows: ['Infrastructure Deployment']
    types: [completed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - uat
          - prod
      committeeCodes:
        description: 'Committee codes included in resource names (e.g. "ITC", "ITC,FINANCE"). Must match the codes used during infrastructure deployment.'
        required: false
        default: ''

# Cancel any in-progress deploy for the same branch/environment. This handles
# the case where a push triggers both the `push` path and a subsequent
# `workflow_run` (because infra also changed): the earlier push-triggered run
# is cancelled and the ordered workflow_run-triggered run takes over.
concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  BACKEND_IMAGE_NAME: shift-dashboard-backend
  FRONTEND_IMAGE_NAME: shift-dashboard-frontend

jobs:
  resolve-target:
    name: Resolve Target Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      committeeCodes: ${{ steps.resolve.outputs.committeeCodes }}
    steps:
      - name: Resolve environment and committee codes
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.environment }}" ]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          else
            ENVIRONMENT="dev"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.committeeCodes }}" ]; then
            COMMITTEE_CODES="${{ github.event.inputs.committeeCodes }}"
          else
            COMMITTEE_CODES="${{ vars.COMMITTEE_CODES }}"
          fi

          COMMITTEE_CODES="${COMMITTEE_CODES,,}"

          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "committeeCodes=$COMMITTEE_CODES" >> "$GITHUB_OUTPUT"
          echo "Resolved environment: $ENVIRONMENT"
          echo "Resolved committee codes: ${COMMITTEE_CODES:-'(none)'}"

  check-infrastructure:
    name: Check Infrastructure
    runs-on: ubuntu-latest
    needs: resolve-target
    environment: ${{ needs.resolve-target.outputs.environment }}
    # When triggered by workflow_run, only proceed if infrastructure deployment succeeded.
    # For push and workflow_dispatch triggers, always run.
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      registry: ${{ steps.check.outputs.registry }}
      backendApp: ${{ steps.check.outputs.backendApp }}
      frontendApp: ${{ steps.check.outputs.frontendApp }}
      resourceGroup: ${{ steps.check.outputs.resourceGroup }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure environment secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=()

          [ -z "$AZURE_CLIENT_ID" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "$AZURE_TENANT_ID" ] && missing+=("AZURE_TENANT_ID")
          [ -z "$AZURE_SUBSCRIPTION_ID" ] && missing+=("AZURE_SUBSCRIPTION_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required environment secrets for '${{ needs.resolve-target.outputs.environment }}': ${missing[*]}"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment target
        id: resolve
        run: |
          ENV="${{ needs.resolve-target.outputs.environment }}"
          COMMITTEE_CODES="${{ needs.resolve-target.outputs.committeeCodes }}"
          COMMITTEE_CODES="${COMMITTEE_CODES,,}"

          # The first code drives resource naming; ALL or empty means no suffix.
          FIRST_CODE=$(echo "$COMMITTEE_CODES" | cut -d',' -f1 | xargs)
          if [[ "$FIRST_CODE" == "all" || -z "$FIRST_CODE" ]]; then
            FIRST_CODE=""
          fi
          PARAM_FILE="infra/params/${ENV}.parameters.json"

          if [ -f "$PARAM_FILE" ]; then
            APP_NAME=$(jq -r '.parameters.appName.value // "shift-dashboard"' "$PARAM_FILE")
          else
            APP_NAME="shift-dashboard"
          fi

          COMMITTEE_SUFFIX="${FIRST_CODE:+-${FIRST_CODE}}"
          RESOURCE_GROUP="${APP_NAME}-${ENV}${COMMITTEE_SUFFIX}-rg"

          echo "Environment:    $ENV"
          echo "Committee codes: ${COMMITTEE_CODES:-'(none)'}"
          echo "First code (naming): ${FIRST_CODE:-'(none)'}"
          echo "Resource group: $RESOURCE_GROUP"

          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_ENV
          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_OUTPUT

      - name: Check Resources
        id: check
        run: |
          rg="$RESOURCE_GROUP"

          echo "Checking for required Azure resources in $rg..."

          # Find Container Registry
          registry=$(az acr list --resource-group $rg --query "[0].loginServer" -o tsv)
          if [ -z "$registry" ]; then
            echo "ERROR: No Container Registry found. Run infrastructure deployment first."
            exit 1
          fi

          # Find Backend Container App
          backendApp=$(az containerapp list --resource-group $rg --query "[?contains(name, 'backend')].name | [0]" -o tsv)
          if [ -z "$backendApp" ]; then
            echo "ERROR: No backend Container App found. Run infrastructure deployment first."
            exit 1
          fi

          # Find Frontend Container App
          frontendApp=$(az containerapp list --resource-group $rg --query "[?contains(name, 'frontend')].name | [0]" -o tsv)
          if [ -z "$frontendApp" ]; then
            echo "ERROR: No frontend Container App found. Run infrastructure deployment first."
            exit 1
          fi

          echo "All required resources found"
          echo "registry=$registry" >> $GITHUB_OUTPUT
          echo "backendApp=$backendApp" >> $GITHUB_OUTPUT
          echo "frontendApp=$frontendApp" >> $GITHUB_OUTPUT
          echo "resourceGroup=$RESOURCE_GROUP" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [resolve-target, check-infrastructure]
    environment: ${{ needs.resolve-target.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure environment secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=()

          [ -z "$AZURE_CLIENT_ID" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "$AZURE_TENANT_ID" ] && missing+=("AZURE_TENANT_ID")
          [ -z "$AZURE_SUBSCRIPTION_ID" ] && missing+=("AZURE_SUBSCRIPTION_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required environment secrets for '${{ needs.resolve-target.outputs.environment }}': ${missing[*]}"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          registryName=$(echo ${{ needs.check-infrastructure.outputs.registry }} | cut -d'.' -f1)
          az acr login --name $registryName

      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t ${{ needs.check-infrastructure.outputs.registry }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ needs.check-infrastructure.outputs.registry }}/${{ env.BACKEND_IMAGE_NAME }}:latest \
            .
          docker push ${{ needs.check-infrastructure.outputs.registry }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ needs.check-infrastructure.outputs.registry }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        run: |
          docker build -f client/Dockerfile \
            -t ${{ needs.check-infrastructure.outputs.registry }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ needs.check-infrastructure.outputs.registry }}/${{ env.FRONTEND_IMAGE_NAME }}:latest \
            .
          docker push ${{ needs.check-infrastructure.outputs.registry }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ needs.check-infrastructure.outputs.registry }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: [resolve-target, check-infrastructure, build-and-push]
    environment: ${{ needs.resolve-target.outputs.environment }}
    steps:
      - name: Validate Azure environment secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=()

          [ -z "$AZURE_CLIENT_ID" ] && missing+=("AZURE_CLIENT_ID")
          [ -z "$AZURE_TENANT_ID" ] && missing+=("AZURE_TENANT_ID")
          [ -z "$AZURE_SUBSCRIPTION_ID" ] && missing+=("AZURE_SUBSCRIPTION_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required environment secrets for '${{ needs.resolve-target.outputs.environment }}': ${missing[*]}"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Backend
        run: |
          az containerapp registry set \
            --name ${{ needs.check-infrastructure.outputs.backendApp }} \
            --resource-group ${{ needs.check-infrastructure.outputs.resourceGroup }} \
            --server ${{ needs.check-infrastructure.outputs.registry }} \
            --identity system

          az containerapp update \
            --name ${{ needs.check-infrastructure.outputs.backendApp }} \
            --resource-group ${{ needs.check-infrastructure.outputs.resourceGroup }} \
            --image ${{ needs.check-infrastructure.outputs.registry }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

          echo "Backend deployed"

      - name: Deploy Frontend
        run: |
          az containerapp registry set \
            --name ${{ needs.check-infrastructure.outputs.frontendApp }} \
            --resource-group ${{ needs.check-infrastructure.outputs.resourceGroup }} \
            --server ${{ needs.check-infrastructure.outputs.registry }} \
            --identity system

          az containerapp update \
            --name ${{ needs.check-infrastructure.outputs.frontendApp }} \
            --resource-group ${{ needs.check-infrastructure.outputs.resourceGroup }} \
            --image ${{ needs.check-infrastructure.outputs.registry }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

          echo "Frontend deployed"

      - name: Get URLs
        id: urls
        run: |
          backendUrl=$(az containerapp show \
            --name ${{ needs.check-infrastructure.outputs.backendApp }} \
            --resource-group ${{ needs.check-infrastructure.outputs.resourceGroup }} \
            --query properties.configuration.ingress.fqdn -o tsv)

          frontendUrl=$(az containerapp show \
            --name ${{ needs.check-infrastructure.outputs.frontendApp }} \
            --resource-group ${{ needs.check-infrastructure.outputs.resourceGroup }} \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "backendUrl=https://$backendUrl" >> $GITHUB_OUTPUT
          echo "frontendUrl=https://$frontendUrl" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment successful**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: ${{ steps.urls.outputs.backendUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: ${{ steps.urls.outputs.frontendUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Images**: \`latest\`, \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Logout from Azure
        if: always()
        run: az logout
