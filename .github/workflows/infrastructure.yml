name: Infrastructure Deployment

on:
  push:
    branches:
      - main
      - develop
      - 'releases/**'
    paths:
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep
          echo "Bicep validation successful"

  preview:
    name: Preview Infrastructure Changes
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: What-If Deployment
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          PARAM_FILE="infra/params/${ENV}.parameters.json"

          if [ -f "$PARAM_FILE" ]; then
            echo "Using parameter file: $PARAM_FILE"
            az deployment group what-if \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @"$PARAM_FILE"
          else
            echo "Parameter file not found, using inline parameters"
            az deployment group what-if \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters environment="$ENV"
          fi

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [validate, preview]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      registryName: ${{ steps.deploy.outputs.registryName }}
      registryLoginServer: ${{ steps.deploy.outputs.registryLoginServer }}
      backendUrl: ${{ steps.deploy.outputs.backendUrl }}
      frontendUrl: ${{ steps.deploy.outputs.frontendUrl }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check Resource Location Conflicts
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          PARAM_FILE="infra/params/${ENV}.parameters.json"
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"

          # Read target location from parameter file, fallback to eastus
          if [ -f "$PARAM_FILE" ]; then
            LOCATION=$(jq -r '.parameters.location.value // "eastus"' "$PARAM_FILE")
          else
            LOCATION="eastus"
          fi
          echo "Target location: $LOCATION"

          # Only check if the resource group already exists
          if az group show --name "$RESOURCE_GROUP" &> /dev/null; then
            CONFLICTING=$(az resource list \
              --resource-group "$RESOURCE_GROUP" \
              --query "[?location!='${LOCATION}'].{name:name, location:location, type:type}" \
              -o json)
            COUNT=$(echo "$CONFLICTING" | jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              echo "::error::Location conflict detected! These resources already exist in a different location than '$LOCATION':"
              echo "$CONFLICTING" | jq -r '.[] | "  - " + .name + " [" + .type + "] is in " + .location'
              echo ""
              echo "To resolve: update 'location' in $PARAM_FILE to match the existing resources,"
              echo "delete the conflicting resources, or use a different resource group."
              exit 1
            fi
            echo "No location conflicts found. All existing resources are in: $LOCATION"
          else
            echo "Resource group does not exist yet — no conflict check needed."
          fi

      - name: Deploy to Azure
        id: deploy
        run: |
          echo "Deploying infrastructure..."

          ENV="${{ github.event.inputs.environment || 'dev' }}"
          PARAM_FILE="infra/params/${ENV}.parameters.json"

          # Use parameter file if it exists, otherwise use inline parameters
          if [ -f "$PARAM_FILE" ]; then
            echo "Using parameter file: $PARAM_FILE"
            output=$(az deployment group create \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @"$PARAM_FILE" \
              --query 'properties.outputs' \
              --output json)
          else
            echo "Parameter file not found, using inline parameters"
            output=$(az deployment group create \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters environment="$ENV" \
              --query 'properties.outputs' \
              --output json)
          fi

          echo "Deployment output: $output"

          # Extract outputs with error handling
          registryName=$(echo $output | jq -r '.containerRegistryName.value // "N/A"')
          registryLoginServer=$(echo $output | jq -r '.containerRegistryLoginServer.value // "N/A"')
          backendUrl=$(echo $output | jq -r '.backendUrl.value // "N/A"')
          frontendUrl=$(echo $output | jq -r '.frontendUrl.value // "N/A"')
          keyVaultName=$(echo $output | jq -r '.keyVaultName.value // "N/A"')
          backendAppName=$(echo $output | jq -r '.backendAppName.value // "N/A"')
          frontendAppName=$(echo $output | jq -r '.frontendAppName.value // "N/A"')
          backendPrincipalId=$(echo $output | jq -r '.backendPrincipalId.value // "N/A"')

          # Validate outputs
          if [ "$registryLoginServer" = "N/A" ] || [ "$backendUrl" = "N/A" ]; then
            echo "ERROR: Failed to extract deployment outputs"
            echo "Output: $output"
            exit 1
          fi

          echo "registryName=$registryName" >> $GITHUB_OUTPUT
          echo "registryLoginServer=$registryLoginServer" >> $GITHUB_OUTPUT
          echo "backendUrl=$backendUrl" >> $GITHUB_OUTPUT
          echo "frontendUrl=$frontendUrl" >> $GITHUB_OUTPUT
          echo "keyVaultName=$keyVaultName" >> $GITHUB_OUTPUT
          echo "backendAppName=$backendAppName" >> $GITHUB_OUTPUT
          echo "frontendAppName=$frontendAppName" >> $GITHUB_OUTPUT
          echo "backendPrincipalId=$backendPrincipalId" >> $GITHUB_OUTPUT

          echo "Infrastructure deployment complete"
          echo ""
          echo "Container Registry: $registryLoginServer"
          echo "Backend URL: $backendUrl"
          echo "Frontend URL: $frontendUrl"
          echo "Key Vault: $keyVaultName"

      - name: Populate Key Vault Secrets
        run: |
          KV_NAME="${{ steps.deploy.outputs.keyVaultName }}"

          echo "Storing Shiftboard secrets in Key Vault: $KV_NAME"

          # Store Shiftboard API credentials
          az keyvault secret set \
            --vault-name $KV_NAME \
            --name sb-access-key \
            --value "${{ secrets.SB_ACCESS_KEY }}" \
            --output none

          az keyvault secret set \
            --vault-name $KV_NAME \
            --name sb-signature-key \
            --value "${{ secrets.SB_SIGNATURE_KEY }}" \
            --output none

          echo "Secrets stored in Key Vault"

      - name: Summary
        run: |
          echo "## Infrastructure Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment successful**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- **Container Registry**: \`${{ steps.deploy.outputs.registryLoginServer }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Key Vault**: \`${{ steps.deploy.outputs.keyVaultName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend App**: \`${{ steps.deploy.outputs.backendAppName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend App**: \`${{ steps.deploy.outputs.frontendAppName }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend URL**: ${{ steps.deploy.outputs.backendUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend URL**: ${{ steps.deploy.outputs.frontendUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: \`${{ github.event.inputs.environment || 'dev' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: \`${{ secrets.AZURE_RESOURCE_GROUP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secrets" >> $GITHUB_STEP_SUMMARY
          echo "Shiftboard credentials stored in Key Vault" >> $GITHUB_STEP_SUMMARY
